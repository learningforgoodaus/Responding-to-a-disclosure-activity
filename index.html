<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workplace Scenario Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0" />

    <style>
        /* General Styles */
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 20px;
        }

        /* Heading Tweak: Removing Colors */
        .choices h2, .choices h3, .choice-heading {
            color: #333333 !important; /* Standard text color */
            font-weight: 600;
            margin-top: 10px;
        }

        /* Mobile Instruction Styling */
        .swipe-instruction {
            display: none; /* Hidden on desktop */
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            margin: 10px 0 20px 0;
            font-family: 'Roboto', sans-serif;
            line-height: 1.4;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }

        /* Responsive Breakpoint for Mobile */
        @media (max-width: 768px) {
            .swipe-instruction {
                display: block; /* Visible only on mobile/tablets */
            }
        }

        /* Existing Structure Styles */
        .progress-container {
            background: #eee;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .progress-bar {
            background: #4caf50;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .trust-indicator {
            font-size: 0.85rem;
            color: #555;
            text-align: right;
            margin-bottom: 20px;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: #007bff;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .scenario-text {
            font-size: 1.1rem;
            color: #222;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div id="app-container">
        <main class="card" id="scenario-card" aria-live="polite">

            <div class="card-header">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
                </div>
                <div class="trust-indicator" id="trust-indicator">
                    Trust Level: <span id="trust-value">Neutral</span>
                </div>
            </div>

            <div class="content-wrapper">
                <div class="avatar-container" id="avatar-container">
                    <div class="avatar">S</div>
                </div>

                <div class="text-area">
                    <div id="monologue-text" class="monologue-text"></div>
                    
                    <div id="swipe-instruction" class="swipe-instruction">
                        Swipe the cards <strong>left</strong> or <strong>right</strong> to decide if the action is <br>
                        Helpful & Safe or Harmful & Unsafe.
                    </div>

                    <div id="scenario-text" class="scenario-text">Loading module...</div>
                </div>
            </div>

            <div id="choices-container" class="choices"></div>
        </main>
    </div>

    <script src="scenario_data.js"></script>
    <script src="script.js"></script>
</body>

</html>
