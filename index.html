<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workplace Scenario Training</title>
    <!-- Professional Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0" />

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="app-container">
        <main class="card" id="scenario-card" aria-live="polite">

            <!-- Header with Status -->
            <div class="card-header">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
                </div>
                <div class="trust-indicator" id="trust-indicator">Trust Level: <span id="trust-value">Neutral</span>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-wrapper">
                <div class="avatar-container" id="avatar-container">
                    <div class="avatar">S</div>
                </div>

                <div class="text-area">
                    <div id="monologue-text" class="monologue-text"></div>
                    <div id="scenario-text" class="scenario-text">Loading module...</div>
                </div>
            </div>

            <div id="choices-container" class="choices"></div>
        </main>
    </div>

    <!-- Data script first -->
    <script src="scenario_data.js"></script>
    <!-- Application logic -->
    <script src="script.js"></script>
</body>

</html>
